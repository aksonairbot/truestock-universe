# DigitalOcean App Platform spec for Truestock Universe — Tier C ($27/mo).
# Single-vendor setup: App Platform web + DO Managed Postgres.
#
# For Tier B ($12/mo) with external Postgres (Neon free tier), use
# .do/app.minimal.yaml instead. See docs/sizing.md for the tier comparison.
#
# Apply with:
#   doctl apps create --spec .do/app.yaml            # first deploy
#   doctl apps update <APP_ID> --spec .do/app.yaml   # subsequent
#
# Secrets (DATABASE_URL, RAZORPAY_KEY_*, RAZORPAY_WEBHOOK_SECRET, INTERNAL_API_SECRET,
# optional SENTRY_DSN) must be set in the App Platform dashboard as encrypted env
# vars BEFORE the first deploy — don't commit values to this file.

name: truestock-universe
region: blr1      # Bangalore — lowest latency for India + closest to DO Mumbai postgres

# -----------------------------------------------------------------------------
# Web service — Next.js app
# -----------------------------------------------------------------------------
services:
  - name: web
    source_dir: /
    github:
      repo: truestock/truestock-universe
      branch: main
      deploy_on_push: true
    build_command: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm build --filter=web
    run_command: pnpm --filter web start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs       # 1 vCPU / 1 GB — bump to basic-s if needed
    health_check:
      http_path: /mis/revenue
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RAZORPAY_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: RAZORPAY_KEY_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: RAZORPAY_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: INTERNAL_API_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SENTRY_DSN
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}

# -----------------------------------------------------------------------------
# Jobs — cron for Razorpay sync + metrics rollup
# -----------------------------------------------------------------------------
jobs:
  # Hourly reconciliation — safety net for dropped webhooks
  - name: cron-sync-razorpay
    kind: CRON
    schedule: "0 * * * *"       # every hour on the hour (UTC)
    source_dir: /
    github:
      repo: truestock/truestock-universe
      branch: main
    build_command: |
      corepack enable
      pnpm install --frozen-lockfile --prod=false
    run_command: |
      curl -fsS -X POST \
        -H "Authorization: Bearer $INTERNAL_API_SECRET" \
        "$APP_URL/api/sync/razorpay"
    instance_size_slug: basic-xxs
    envs:
      - key: INTERNAL_API_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APP_URL
        scope: RUN_TIME
        value: ${_self.APP_URL}

  # Nightly metrics rollup — runs at 02:30 IST (21:00 UTC)
  - name: cron-metrics
    kind: CRON
    schedule: "0 21 * * *"
    source_dir: /
    github:
      repo: truestock/truestock-universe
      branch: main
    build_command: |
      corepack enable
      pnpm install --frozen-lockfile --prod=false
    run_command: |
      curl -fsS -X POST \
        -H "Authorization: Bearer $INTERNAL_API_SECRET" \
        "$APP_URL/api/cron/metrics"
    instance_size_slug: basic-xxs
    envs:
      - key: INTERNAL_API_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APP_URL
        scope: RUN_TIME
        value: ${_self.APP_URL}

  # Pre-deploy migration runner — blocks deploy if migrations fail
  - name: db-migrate
    kind: PRE_DEPLOY
    source_dir: /
    github:
      repo: truestock/truestock-universe
      branch: main
    build_command: |
      corepack enable
      pnpm install --frozen-lockfile
    run_command: pnpm db:migrate
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET

# -----------------------------------------------------------------------------
# Database — DO Managed Postgres
# -----------------------------------------------------------------------------
databases:
  - name: truestock-db
    engine: PG
    version: "16"
    production: true
    cluster_name: truestock-universe-db   # attach an existing cluster by name
